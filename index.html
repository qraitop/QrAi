<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QrAI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#212121;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.chat{
width:100%;
max-width:700px;
height:100vh;
display:flex;
flex-direction:column;
}

.header{
padding:20px;
font-size:25px;
font-weight:bold;
text-align:center;
border-bottom:1px solid #333;
}

.messages{
flex:1;
overflow:auto;
padding:20px;
}

.ai,.user{
padding:14px;
margin:10px 0;
border-radius:12px;
white-space:pre-wrap;
}

.ai{
background:#2f2f2f;
}

.user{
background:#0b84ff;
text-align:right;
}

.bottom{
display:flex;
padding:15px;
gap:10px;
border-top:1px solid #333;
}

input{
flex:1;
padding:15px;
border:none;
border-radius:10px;
background:#2f2f2f;
color:white;
font-size:16px;
}

button{
padding:15px 25px;
border:none;
border-radius:10px;
background:#10a37f;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div class="chat">

<div class="header">
QrAI
</div>

<div class="messages" id="messages">
<div class="ai">
Hello 👋<br>
How can I help you?
</div>
</div>

<div class="bottom">
<input id="text" placeholder="Message QrAI...">
<button onclick="send()">Send</button>
</div>

</div>

<script>

const API_URL="https://qraiapi1.qrai-top.workers.dev";

async function send(){

const input=document.getElementById("text");
const msg=input.value.trim();

if(!msg)return;

const messages=document.getElementById("messages");

messages.innerHTML+=`<div class="user">${msg}</div>`;
messages.scrollTop=messages.scrollHeight;

input.value="";

try{

const res=await fetch(API_URL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:msg
})
});

const data=await res.json();

messages.innerHTML+=`<div class="ai">${data.reply}</div>`;
messages.scrollTop=messages.scrollHeight;

}catch(e){

messages.innerHTML+=`<div class="ai">❌ Error connecting to AI.</div>`;

}

}

</script>

</body>
</html>
