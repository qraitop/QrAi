
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QrAi</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:SF Pro Display,Arial;
}

body{

background:linear-gradient(180deg,#eef8ff,#ffffff);

height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

}

.bg{

position:absolute;

width:500px;

height:500px;

background:#9fd7ff;

filter:blur(180px);

border-radius:50%;

opacity:.35;

top:-150px;

right:-150px;

}

.chat{

width:95%;

max-width:430px;

height:90vh;

background:rgba(255,255,255,.45);

backdrop-filter:blur(35px);

border:1px solid rgba(255,255,255,.6);

border-radius:35px;

display:flex;

flex-direction:column;

overflow:hidden;

box-shadow:0 20px 60px rgba(0,0,0,.12);

}

.header{

padding:20px;

font-size:26px;

font-weight:700;

color:#2c3e50;

}

.messages{

flex:1;

padding:20px;

overflow:auto;

}

.ai{

background:white;

padding:16px;

border-radius:22px;

margin-bottom:15px;

box-shadow:0 5px 18px rgba(0,0,0,.08);

}

.input{

padding:18px;

display:flex;

gap:10px;

}

input{

flex:1;

border:none;

outline:none;

background:rgba(255,255,255,.75);

padding:15px;

border-radius:30px;

font-size:16px;

backdrop-filter:blur(20px);

}

button{

width:52px;

height:52px;

border:none;

border-radius:50%;

background:#56b8ff;

color:white;

font-size:20px;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.05);

}

</style>

</head>

<body>

<div class="bg"></div>

<div class="chat">

<div class="header">

🤍 QrAi

</div>

<div class="messages" id="messages">

<div class="ai">

Hello 👋

I'm QrAi.

How can I help you today?

</div>

</div>

<div class="input">

<input id="text" placeholder="Ask anything...">

<button onclick="send()">➜</button>

</div>

</div>

<script>

function send(){

let t=document.getElementById("text");

if(t.value=="") return;

let m=document.getElementById("messages");

m.innerHTML+=`<div style="text-align:right;margin:15px;"><div style="display:inline-block;background:#56b8ff;color:white;padding:15px;border-radius:20px;">${t.value}</div></div>`;

setTimeout(()=>{

m.innerHTML+=`<div class="ai">This is a demo AI response.</div>`;

m.scrollTop=m.scrollHeight;

},600);

t.value="";

}

</script>

</body>

</html>
